name: Build Android ARM64 Audio Bridge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip git wget

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Clone tinyalsa
        run: |
          git clone https://github.com/tinyalsa/tinyalsa.git

      - name: Compile bridge (ARM64 API 26)
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          $TOOLCHAIN/bin/aarch64-linux-android26-clang \
            bridge.c \
            tinyalsa/src/pcm.c \
            tinyalsa/src/pcm_hw.c \
            tinyalsa/src/mixer.c \
            tinyalsa/src/mixer_hw.c \
            tinyalsa/src/snd_utils.c \
            -I tinyalsa/include \
            -o bridge \
            -laaudio -llog

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bridge-binary
          path: bridge
