name: Build Android ARM64 Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Compile
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          $TOOLCHAIN/bin/aarch64-linux-android21-clang \
            bridge.c -o bridge \
            -I$NDK/sysroot/usr/include \
            -L$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/21 \
            -laaudio

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-binary
          path: bridge
